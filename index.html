<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>오늘의 버프 냥이</title>
    <meta
      name="description"
      content="오늘 너에게 필요한 냥이가 나타난다냥"
    />
    <meta property="og:title" content="오늘의 버프 냥이" />
    <meta
      property="og:description"
      content="오늘 너에게 필요한 냥이가 나타난다냥"
    />
    <meta property="og:image" content="assets/share/nyang-island-share.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Jua&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="screen is-active" id="start-screen" aria-labelledby="start-title">
        <div class="hero-panel">
          <div class="hero-preview" aria-hidden="true">
            <div class="preview-glow"></div>
            <img id="preview-cat" src="assets/cats/01_confidence.png" alt="" />
            <span class="preview-spark spark-one"></span>
            <span class="preview-spark spark-two"></span>
            <span class="preview-spark spark-three"></span>
          </div>
          <h1 id="start-title">오늘의 버프 냥이</h1>
          <p>오늘 너에게 필요한 냥이가 나타난다냥</p>
          <button class="primary-button" type="button" id="start-button">
            버프 냥이 찾기
          </button>
        </div>
      </section>

      <section class="screen" id="quiz-screen" aria-live="polite">
        <div class="quiz-top">
          <span id="step-label">1 / 4</span>
          <div class="progress-track">
            <span id="progress-bar"></span>
          </div>
        </div>
        <div class="question-panel">
          <p class="question-kicker">냥이 선택 중</p>
          <h2 id="question-title"></h2>
          <div class="option-list" id="option-list"></div>
        </div>
      </section>

      <section class="screen" id="loading-screen" aria-live="polite">
        <div class="loading-panel">
          <div class="paw-loader" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
          <h2>냥이 오는 중</h2>
        </div>
      </section>

      <section class="screen" id="result-screen" aria-labelledby="result-title">
        <div class="result-panel">
          <p class="result-kicker">오늘의 냥이 도착</p>
          <h2 id="result-title"></h2>
          <div class="cat-stage">
            <img id="result-image" alt="" />
          </div>
          <p class="result-message" id="result-message"></p>
          <div class="result-actions">
            <button class="secondary-button" type="button" id="retry-button">
              다시 하기
            </button>
            <button class="primary-button" type="button" id="share-button">
              공유하기
            </button>
          </div>
          <p class="copy-status" id="copy-status" role="status"></p>
        </div>
      </section>
    </main>

    <div class="share-modal" id="share-modal" aria-hidden="true">
      <div class="share-backdrop" data-close-share></div>
      <section class="share-sheet" role="dialog" aria-modal="true" aria-labelledby="share-title">
        <button class="share-close" type="button" aria-label="닫기" data-close-share>×</button>
        <div class="share-preview-card">
          <img class="share-preview-image" id="share-preview-image" alt="" />
          <p class="share-preview-result" id="share-result-text"></p>
        </div>
        <div class="share-actions">
          <button class="kakao-button" type="button" id="kakao-button">카카오톡 공유</button>
          <button class="secondary-button" type="button" id="copy-link-button">링크 복사</button>
        </div>
      </section>
    </div>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script src="https://t1.kakaocdn.net/kakao_js_sdk/2.7.5/kakao.min.js"></script>
    <script src="script.js"></script>
  </body>
</html>
